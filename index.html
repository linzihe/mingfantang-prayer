<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>明梵堂祈福笺 — 本地打印系统</title>
<!-- Google Fonts: cross-platform Chinese calligraphy -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Long+Cang&family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--card-bg:#fffef9;--border:#c9b38e;
  --text:#3d2b1a;--text-light:#6b5a44;--accent:#8b1a1a;
  --accent-light:#b33a3a;--input-bg:#fffef9;--input-border:#d4c5a9;
  --focus-ring:#8b1a1a44;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:6px;
  --font-cn:"Microsoft YaHei","PingFang SC","Noto Sans SC","Helvetica Neue",sans-serif;
}
html,body{height:100%;font-family:var(--font-cn);background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden}
#app{display:flex;height:100vh;width:100vw}

/* ===== Left Form Panel ===== */
#form-panel{
  width:430px;min-width:430px;height:100vh;overflow-y:auto;overflow-x:hidden;
  padding:16px 20px;background:#faf7f0;border-right:2px solid var(--border);
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
#form-panel::-webkit-scrollbar{width:6px}
#form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#form-panel h1{font-size:1.25rem;color:var(--accent);text-align:center;letter-spacing:0.06em;border-bottom:2px solid var(--border);padding-bottom:8px;margin-bottom:0}
#form-panel h1 small{display:block;font-size:0.6rem;color:var(--text-light);letter-spacing:0.04em;font-weight:400;margin-top:1px}

.form-section{background:var(--card-bg);border:1px solid var(--input-border);border-radius:var(--radius);padding:10px 13px;box-shadow:var(--shadow)}
.form-section-title{font-size:0.8rem;font-weight:700;color:var(--accent);margin-bottom:7px;padding-bottom:4px;border-bottom:1px dotted var(--input-border);letter-spacing:0.03em}

.form-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap}
.form-row:last-child{margin-bottom:0}
.form-row>label{font-size:0.78rem;color:var(--text);white-space:nowrap;min-width:52px;font-weight:500}

input[type="text"],input[type="number"],input[type="password"],textarea,select{
  font-family:inherit;font-size:0.8rem;padding:5px 8px;border:1px solid var(--input-border);
  border-radius:4px;background:var(--input-bg);color:var(--text);outline:none;
  transition:border-color .15s;flex:1;min-width:48px;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--focus-ring)}
textarea{resize:vertical;min-height:65px}
select{cursor:pointer}
input[type="number"]{max-width:72px}
.radio-group{display:flex;gap:10px;align-items:center}
.radio-group label{display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.8rem;min-width:auto}
.radio-group input[type="radio"]{accent-color:var(--accent)}
.inline-group{display:flex;align-items:center;gap:2px}
.inline-group span{font-size:0.74rem;color:var(--text-light)}

#custom-size-inputs{display:none;margin-top:3px}
#custom-size-inputs.show{display:flex;gap:10px;align-items:center}
#custom-size-inputs label{min-width:auto;font-size:0.74rem;display:flex;align-items:center;gap:3px}
#custom-size-inputs input{max-width:64px}

.btn{font-family:inherit;font-size:0.81rem;font-weight:600;padding:7px 14px;border:none;border-radius:4px;cursor:pointer;letter-spacing:0.03em;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-light)}
.btn-primary:active{transform:scale(.98)}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-outline:hover{background:#8b1a1a0d}
.btn-sm{font-size:0.74rem;padding:4px 9px}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

#api-status{font-size:0.7rem;margin-left:3px;font-weight:400}
#api-status.success{color:#2d7b3a}
#api-status.error{color:#b33a3a}
#api-status.testing{color:#b38b2a}

.spinner{display:inline-block;width:13px;height:13px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:2px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Right Preview Panel ===== */
#preview-panel{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  background:#3d3226;overflow:auto;padding:12px;
}
#preview-toolbar{
  display:flex;gap:5px;align-items:center;margin-bottom:8px;flex-shrink:0;
  position:sticky;top:0;z-index:10;background:rgba(61,50,38,0.9);
  padding:6px 10px;border-radius:6px;backdrop-filter:blur(4px);
}
#preview-toolbar .btn{background:#5a4a3a;color:#e0d5c5;border:1px solid #7a6a5a;font-size:0.72rem;padding:4px 8px}
#preview-toolbar .btn:hover{background:#6a5a4a}
#preview-toolbar span{color:#c0b5a5;font-size:0.74rem;min-width:42px;text-align:center}

#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%}
#preview-canvas{display:block;box-shadow:0 6px 30px rgba(0,0,0,0.55);image-rendering:auto}
.empty-preview{color:#9a8a7a;font-size:1rem;text-align:center;letter-spacing:.05em;padding:50px 30px;border:2px dashed #6a5a4a;border-radius:8px}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3d2b1a;color:#f5f0e8;padding:10px 22px;border-radius:20px;font-size:0.81rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:9999;letter-spacing:.03em}
#toast.show{opacity:1}

/* ===== Mobile Responsive ===== */
@media (max-width: 768px) {
  html,body{overflow:auto}
  #app{flex-direction:column;height:auto;min-height:100vh}
  #form-panel{width:100%;min-width:0;height:auto;max-height:none;overflow:visible;padding:12px 14px;gap:8px}
  #form-panel h1{font-size:1.1rem}
  #preview-panel{min-height:60vh;padding:8px}
  #preview-toolbar{position:static;margin-bottom:6px}
  .btn{font-size:0.9rem;padding:10px 18px;-webkit-tap-highlight-color:transparent}
  .btn-sm{font-size:0.8rem;padding:6px 10px}
  input[type="text"],input[type="number"],input[type="password"],textarea,select{font-size:16px}
  .form-row>label{min-width:48px;font-size:0.85rem}
  #canvas-wrap{overflow:auto}
}

@media (max-width: 480px) {
  #form-panel{padding:8px 10px;gap:6px}
  #form-panel h1{font-size:1rem}
  .form-section{padding:8px 10px}
  .btn{font-size:0.85rem;padding:8px 14px}
  .btn-row{gap:4px}
  #preview-toolbar{flex-wrap:wrap;gap:3px}
}
</style>
</head>
<body>

<div id="app">

<!-- ===== LEFT FORM ===== -->
<div id="form-panel">
  <h1>明梵堂祈福笺<small>MING FAN TANG · 本地打印系统</small></h1>

  <div class="form-section">
    <div class="form-section-title">一、善信基本资料</div>
    <div class="form-row"><label>善信姓名</label><input type="text" id="f_name" placeholder="请输入姓名" autocomplete="off"></div>
    <div class="form-row"><label>性别</label><div class="radio-group"><label><input type="radio" name="gender" value="男" checked> 男</label><label><input type="radio" name="gender" value="女"> 女</label></div></div>
    <div class="form-row"><label>生辰</label><div class="inline-group"><input type="number" id="f_by" placeholder="年" min="1900" max="2100" style="max-width:60px"><span>年</span><input type="number" id="f_bm" placeholder="月" min="1" max="12" style="max-width:48px"><span>月</span><input type="number" id="f_bd" placeholder="日" min="1" max="31" style="max-width:48px"><span>日</span></div></div>
    <div class="form-row"><label></label><div class="radio-group"><label><input type="radio" name="calendar" value="阳历" checked> 阳历</label><label><input type="radio" name="calendar" value="农历"> 农历</label></div></div>
    <div class="form-row"><label>时辰</label><select id="f_sc" style="max-width:180px"><option value="">（选填）</option><option>子时</option><option>丑时</option><option>寅时</option><option>卯时</option><option>辰时</option><option>巳时</option><option>午时</option><option>未时</option><option>申时</option><option>酉时</option><option>戌时</option><option>亥时</option></select></div>
    <div class="form-row"><label>详细住址</label><textarea id="f_addr" rows="2" placeholder="请输入详细住址"></textarea></div>
  </div>

  <div class="form-section">
    <div class="form-section-title">二、奉灯设置</div>
    <div class="form-row">
      <label>奉点灯名</label>
      <select id="f_lamp" onchange="document.getElementById('f_lamp_custom').style.display=this.value==='__custom__'?'':'none'">
        <option value="">— 请选择 —</option>
        <option>明梵普照光明总灯</option><option>文昌启慧灯</option><option>魁星夺元灯</option><option>贵人提携灯</option><option>文思清宁灯</option><option>五路纳财灯</option><option>事业安泰灯</option><option>财库守藏灯</option><option>小人退散灯</option><option>商机通达灯</option><option>阖家光明平安灯</option><option>行路安宁灯</option><option>安神净虑灯</option><option>福寿延宁灯</option><option>正缘和合灯</option><option>家宅睦宁灯</option><option>稚子福慧灯</option><option>人缘和顺灯</option><option>太岁解厄元辰灯</option><option>消障解滞灯</option><option>玄门静心灯</option>
        <option value="__custom__">✎ 其他（自行输入）</option>
      </select>
      <input type="text" id="f_lamp_custom" placeholder="请输入灯名" style="display:none;margin-top:4px;width:100%;">
    </div>
    <div class="form-row"><label>供灯期限</label><div class="radio-group"><label><input type="radio" name="duration" value="一日灯" checked> 一日灯</label><label><input type="radio" name="duration" value="七日灯"> 七日灯</label><label><input type="radio" name="duration" value="月度灯"> 月度灯</label></div></div>
    <div class="form-row"><label>供灯盏数</label><input type="text" id="f_lamp_count" placeholder="如：一盏 / 三盏 / 七盏" style="max-width:200px;"></div>
  </div>

  <div class="form-section">
    <div class="form-section-title">三、善信原始祈愿</div>
    <textarea id="f_prayer" rows="4" placeholder="请输入善信原始祈愿文本（可用白话文，点击AI润色自动转化为雅致疏文）"></textarea>
  </div>

  <div class="form-section">
    <div class="form-section-title">四、纸张设定</div>
    <div class="form-row"><label>纸张尺寸</label><select id="f_paper"><option value="A4">A4（210mm × 297mm）</option><option value="A5">A5（148mm × 210mm）</option><option value="16K">16开（184mm × 260mm）</option><option value="custom">自定义尺寸</option></select></div>
    <div id="custom-size-inputs"><label>宽 <input type="number" id="f_cw" placeholder="mm" min="50" max="600" value="210"> mm</label><label>高 <input type="number" id="f_ch" placeholder="mm" min="50" max="600" value="297"> mm</label></div>
  </div>

  <div class="form-section">
    <div class="form-section-title">五、DeepSeek API 设置</div>
    <div class="form-row"><label>API Key</label><input type="password" id="f_apikey" placeholder="sk-..." autocomplete="off"></div>
    <div class="form-row"><label>模型</label><select id="f_model"><option value="deepseek-chat">deepseek-chat</option></select><button class="btn btn-outline btn-sm" id="btn-test" type="button">测试连通性</button><span id="api-status"></span></div>
  </div>

  <div class="form-section">
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-ai" type="button">✨ AI润色祈愿文</button>
      <button class="btn btn-primary" id="btn-gen" type="button">📜 生成祈福笺预览</button>
      <button class="btn btn-outline" id="btn-pdf" type="button">🖼️ 导出图片打印</button>
    </div>
  </div>

  <div style="text-align:center;font-size:0.65rem;color:var(--text-light);padding-bottom:6px">
    所有资料仅保存在本地浏览器 · 无后端服务器<br>快捷键 Ctrl+G 生成预览 · Ctrl+P 导出图片
  </div>
</div>

<!-- ===== RIGHT PREVIEW ===== -->
<div id="preview-panel">
  <div id="preview-toolbar">
    <button class="btn btn-sm" id="btn-zout" type="button">🔍−</button>
    <span id="zoom-label">100%</span>
    <button class="btn btn-sm" id="btn-zin" type="button">🔍+</button>
    <button class="btn btn-sm" id="btn-zfit" type="button">适应窗口</button>
  </div>
  <div id="canvas-wrap">
    <div class="empty-preview" id="empty-hint">点击「📜 生成祈福笺预览」<br>查看竖排红底祈福笺效果</div>
  </div>
</div>

</div><!-- /app -->

<div id="toast"></div>

<script>
(function(){
'use strict';

/* ===========================================================
   SIMPLIFIED → TRADITIONAL CONVERTER
   Maps simplified Chinese characters to traditional forms.
   =========================================================== */
const S2T = (function(){

// Chinese formal numerals (大写数字 / 会计用数字)
const CN_DIGITS = ['〇','一','二','三','四','五','六','七','八','九'];
const CN_UNITS  = ['','拾','佰','仟','万'];

function numToCN(n) {
  // Convert integer to formal Chinese numeral (e.g. 2026 → 贰零贰陆)
  if (n === 0) return CN_DIGITS[0];
  const s = String(n);
  let r = '';
  for (let i = 0; i < s.length; i++) {
    r += CN_DIGITS[parseInt(s[i])];
  }
  return r;
}

function todayStr(){
  const n=new Date();
  return `${numToCN(n.getFullYear())}年${numToCN(n.getMonth()+1)}月${numToCN(n.getDate())}日`;
}

function getData(){
  const by = f_by.value ? numToCN(parseInt(f_by.value)) : '____';
  const bm = f_bm.value ? numToCN(parseInt(f_bm.value)) : '__';
  const bd = f_bd.value ? numToCN(parseInt(f_bd.value)) : '__';
  return {
    name:f_name.value.trim()||'（待填）',gender:gRV('gender')||'男',
    birth:`${by}年${bm}月${bd}日`,
    calendar:gRV('calendar')||'阳历',shichen:f_sc.value||'（未填）',

    prayer:polishedPrayer||f_prayer.value.trim()||'（祈愿内容待填）',
    today:todayStr()
  };
}

/* ===========================================================
   CANVAS CERTIFICATE RENDERER
   Pure Canvas 2D — draws every char manually for reliability
   =========================================================== */

// Google Fonts for cross-platform Chinese calligraphy
// Long Cang(龙藏/楷书) | Ma Shan Zheng(马山正/行楷) | Zhi Mang Xing(志莽行/行书)
function getCalligraphyFont() {
  return 'Ma Shan Zheng, Long Cang, Zhi Mang Xing, STXingkai, KaiTi, STKaiti, PingFang SC, serif';
}

function renderCertCanvas(paperW_mm, paperH_mm, scaleFactor) {
  var PX = 3.78 * scaleFactor;
  var W = Math.round(paperW_mm * PX);
  var H = Math.round(paperH_mm * PX);

  var cvs = document.createElement("canvas");
  cvs.width = W; cvs.height = H;
  var ctx = cvs.getContext("2d");
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";

  // === Solid red background ===
  ctx.fillStyle = "#FCE5DF";
  ctx.fillRect(0, 0, W, H);

  // Paper grain
  var imgData = ctx.getImageData(0, 0, W, H);
  var pd = imgData.data;
  for (var i = 0; i < pd.length; i += 4) {
    var gn = (Math.random() - 0.5) * 4;
    pd[i] = Math.min(255, Math.max(0, pd[i] + gn));
    pd[i+1] = Math.min(255, Math.max(0, pd[i+1] + gn * 0.15));
    pd[i+2] = Math.min(255, Math.max(0, pd[i+2] + gn * 0.1));
  }
  ctx.putImageData(imgData, 0, 0);

  // Cross-platform fonts: Long Cang(龙藏/楷书) + Ma Shan Zheng(马山正/行楷)
  // Fallback: system KaiTi(Windows) → STKaiti(Mac) → PingFang(iOS) → serif
  var ffBold = "Noto Serif SC, SimSun, 宋体, Songti SC, STSong, serif";
  var ffNormal = "Ma Shan Zheng, Zhi Mang Xing, STXingkai, KaiTi, STKaiti, PingFang SC, serif";
  var tc = "#0d0505";

  // === BIG Logo watermark at center ===
  if (logoImage && logoImage.complete && logoImage.naturalWidth > 0) {
    var logoMax = Math.round(100 * PX);
    var ratio = Math.min(logoMax / logoImage.naturalWidth, logoMax / logoImage.naturalHeight);
    var lw = Math.round(logoImage.naturalWidth * ratio);
    var lh = Math.round(logoImage.naturalHeight * ratio);
    ctx.globalAlpha = 0.28;
    ctx.drawImage(logoImage, Math.round((W - lw) / 2), Math.round((H - lh) / 2), lw, lh);
    ctx.globalAlpha = 1.0;
  }

  // === Margins ===
  var margin = Math.round(8 * PX);
  var cL = margin;
  var cR = W - margin;
  var cT = margin;
  var cB = H - margin;
  var usableW = cR - cL;
  var usableH = cB - cT;

  // === Data ===
  var raw = getData();
  var dt = {};
  for (var k in raw) dt[k] = T(raw[k]);
  var NL = String.fromCharCode(10);
  var FS = String.fromCharCode(0x3000);

  // === TITLE (思源宋体 bold 700, large) ===
  var titleSz = Math.round(9 * PX);
  ctx.fillStyle = tc;
  ctx.font = "bold " + titleSz + "px " + ffBold;
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.fillText(T("明梵堂坛前祈福笺"), W / 2, cT);
  var colTop = cT + Math.round(titleSz * 2.2);

  // === Build formatted text: array of {char, bold, size} ===
  function seg(text, isBold) {
    var arr = [];
    for (var i = 0; i < text.length; i++) {
      arr.push({c: text[i], b: isBold});
    }
    return arr;
  }

  var formatted = [];

  // Info - labels bold+楷书, values normal+行楷
  formatted = formatted.concat(seg("奉点：", true));
  formatted = formatted.concat(seg(dt.lamp + FS + dt.duration, false));
  formatted = formatted.concat(seg(NL, false));
  formatted = formatted.concat(seg("善信：", true));
  formatted = formatted.concat(seg(dt.name, false));
  formatted = formatted.concat(seg(FS, false));
  formatted = formatted.concat(seg("性别：", true));
  formatted = formatted.concat(seg(dt.gender, false));
  formatted = formatted.concat(seg(NL, false));
  formatted = formatted.concat(seg("生辰：", true));
  formatted = formatted.concat(seg(dt.birth, false));
  formatted = formatted.concat(seg(FS, false));
  formatted = formatted.concat(seg(dt.calendar, false));
  formatted = formatted.concat(seg(NL, false));
  formatted = formatted.concat(seg("时辰：", true));
  formatted = formatted.concat(seg(dt.shichen, false));
  formatted = formatted.concat(seg(NL, false));
  formatted = formatted.concat(seg("住址：", true));
  formatted = formatted.concat(seg(dt.addr, false));

  if (dt.lampCount) {
    formatted = formatted.concat(seg(NL, false));
    formatted = formatted.concat(seg("供灯盏数：", true));
    formatted = formatted.concat(seg(dt.lampCount, false));
  }

  // Prayer - header bold+楷书, body normal+行楷
  formatted = formatted.concat(seg(NL, false));
  formatted = formatted.concat(seg("祈愿：", true));
  formatted = formatted.concat(seg(dt.prayer.replace(/\n/g, ""), false));

  // Closing - all normal+行楷
  formatted = formatted.concat(seg(NL, false));
  formatted = formatted.concat(seg("弟子诚心叩拜本堂历代祖师，仰求慈光垂护。", false));
  formatted = formatted.concat(seg("今主事弟子于明梵堂坛前，焚香点灯，以此明灯功德，专门回向善信" + dt.name + "。", false));
  formatted = formatted.concat(seg("愿承灯火光明之力，消除一切阻滞烦忧，福慧增长，所愿和平顺遂。", false));
  formatted = formatted.concat(seg("弟子诚心叩请祖师做主，伏惟垂鉴。", false));

  // Footer - bold+楷书 (separate column)
  var footerFormatted = [];
  footerFormatted = footerFormatted.concat(seg("祈福主事：明梵堂", true));
  footerFormatted = footerFormatted.concat(seg(NL, false));
  footerFormatted = footerFormatted.concat(seg(dt.today + FS + "吉时", true));

  // === Adaptive sizing: ALL text MUST fit ===
  var colH = usableH;
  var lh = 1.4;
  var bodySz, smallSz, cpc, totalCols, colW, colGap;
  var mainChars = formatted.length;
  var footerChars = footerFormatted.length;
  var totalChars = mainChars + footerChars + 4; // +4 for footer gap padding

  bodySz = Math.round(8 * PX);
  var minSz = Math.round(2.5 * PX);

  while (bodySz >= minSz) {
    cpc = Math.floor(colH / (bodySz * lh));
    totalCols = Math.ceil(totalChars / cpc);
    colW = Math.round(bodySz * 1.25);
    var neededW = totalCols * colW + (totalCols + 1) * Math.round(bodySz * 0.5);
    if (neededW <= usableW) break;
    bodySz = Math.round(bodySz * 0.92);
  }

  smallSz = Math.round(bodySz * 0.85);
  var minGap = Math.round(bodySz * 0.5);
  colGap = Math.max(minGap, Math.floor((usableW - totalCols * colW) / (totalCols + 1)));

  // === Draw main content columns (right to left) ===
  var curX = cR - colW;
  var idx = 0;
  var lastContentX = curX;

  while (idx < formatted.length && curX > cL) {
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    var cy = colTop;
    var lastBold = null;

    for (var j = 0; j < cpc && idx < formatted.length; j++, idx++) {
      if (cy + bodySz > cB) break;
      var ch = formatted[idx];
      if (ch.b !== lastBold) {
        ctx.fillStyle = tc;
        var sz = ch.b ? bodySz : smallSz;
        var ff = ch.b ? ffBold : ffNormal;
        ctx.font = (ch.b ? "bold " : "") + sz + "px " + ff;
        lastBold = ch.b;
      }
      ctx.fillText(ch.c, curX, cy);
      cy += (ch.b ? bodySz : smallSz) * lh;
    }
    lastContentX = curX;
    curX -= colW + colGap;
  }

  // === Footer: its own column, left of main content ===
  var footerX = lastContentX - colW - Math.round(bodySz * 1.5);
  if (footerX < cL) footerX = cL + Math.round(bodySz * 0.5);

  var fi = 0;
  var fcy = colTop;
  var flastBold = null;
  while (fi < footerFormatted.length) {
    if (fcy + bodySz > cB) break;
    var fch = footerFormatted[fi];
    if (fch.b !== flastBold) {
      ctx.fillStyle = tc;
      var fsz = fch.b ? bodySz : smallSz;
      var fff = fch.b ? ffBold : ffNormal;
      ctx.font = (fch.b ? "bold " : "") + fsz + "px " + fff;
      flastBold = fch.b;
    }
    ctx.fillText(fch.c, footerX, fcy);
    fcy += (fch.b ? bodySz : smallSz) * lh;
    fi++;
  }

  return cvs;
}

async function showPreview() {
  const {w,h}=getPaperMM();
  emptyHint.style.display='none';

  // Wait for Google Fonts to fully load before canvas render
  await document.fonts.ready;

  // Render at 5x for sharper screen preview
  const cvs = renderCertCanvas(w,h,5);
  previewImg = cvs;

  // Remove old canvas
  const oldCvs = canvasWrap.querySelector('canvas');
  if (oldCvs) oldCvs.remove();

  // Create display canvas
  const dispCvs = document.createElement('canvas');
  dispCvs.id = 'preview-canvas';
  dispCvs.style.display = 'block';
  dispCvs.style.boxShadow = '0 6px 30px rgba(0,0,0,0.55)';
  canvasWrap.appendChild(dispCvs);

  currentZoom = 1.0;
  renderToScreen();
  setTimeout(()=>zoomFit(),80);
}

function renderToScreen() {
  const dispCvs = canvasWrap.querySelector('canvas');
  if (!dispCvs || !previewImg) return;

  // previewImg is at 3x scale, so base display = previewImg.width/3 * zoom
  const baseW = previewImg.width / 5;
  const baseH = previewImg.height / 5;
  const dw = Math.round(baseW * currentZoom);
  const dh = Math.round(baseH * currentZoom);

  dispCvs.width = dw;
  dispCvs.height = dh;
  dispCvs.style.width = dw + 'px';
  dispCvs.style.height = dh + 'px';

  const ctx = dispCvs.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(previewImg, 0, 0, dw, dh);
  zoomLabel.textContent = Math.round(currentZoom*100)+'%';
}

function zoomIn(){currentZoom=Math.min(3,currentZoom+0.1);renderToScreen()}
function zoomOut(){currentZoom=Math.max(0.2,currentZoom-0.1);renderToScreen()}
function zoomFit(){
  if(!previewImg)return;
  const pnl=document.getElementById('preview-panel');
  const aw=pnl.clientWidth-40,ah=pnl.clientHeight-90;
  const bw=previewImg.width/3,bh=previewImg.height/3;
  currentZoom=Math.min(aw/bw,ah/bh,1.2);
  renderToScreen();
}

/* ===========================================================
   PDF EXPORT
   =========================================================== */
async function exportPDF(){
  const {w,h}=getPaperMM();
  showToast('正在生成高清图片，请稍候...',3000);
  // Wait for Google Fonts
  await document.fonts.ready;
  // Render at 6x for ultra-high resolution (~576 DPI)
  const cvs=renderCertCanvas(w,h,6);
  cvs.toBlob(function(blob){
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const name=(f_name.value||'善信').replace(/[\\/:*?"<>|]/g,'_');
    a.href=url;
    a.download='明梵堂祈福笺_'+name+'_'+new Date().toISOString().slice(0,10)+'.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('高清图片已导出！可直接打印');
  }, 'image/png');
}

   AI POLISH (DeepSeek)
   =========================================================== */
async function testApi(){
  const key=f_apikey.value.trim();
  if(!key){showToast('请先填入DeepSeek API Key');return}
  apiStatus.textContent='测试中...';apiStatus.className='testing';
  try{
    const r=await fetch('https://api.deepseek.com/v1/models',{headers:{'Authorization':`Bearer ${key}`,'Accept':'application/json'}});
    if(r.ok){apiStatus.textContent='✓ 连通成功';apiStatus.className='success';showToast('DeepSeek API 连通测试成功！')}
    else{const e=await r.json().catch(()=>({}));apiStatus.textContent='✗ '+(e.error?.message||'HTTP '+r.status);apiStatus.className='error';showToast('API连通失败，请检查Key')}
  }catch(e){apiStatus.textContent='✗ 网络错误';apiStatus.className='error';showToast('无法连接，请检查网络')}
}

async function aiPolish(){
  const key=f_apikey.value.trim();
  if(!key){showToast('请先填入DeepSeek API Key');return}
  const raw=f_prayer.value.trim();
  if(!raw){showToast('请先输入善信原始祈愿文本');return}
  btnAi.disabled=true;btnAi.innerHTML='<span class="spinner"></span>AI润色中...';
  showToast('正在请求AI润色，请稍候...');

  const sys=`你是专业玄门疏文润色师，任务：
1.保留善信原本祈愿的核心诉求，不擅自改变善信本意；
2.将现代白话，润色为中式传统疏文文雅繁体字句；
3.严格遵守规则：禁止出现任何试图强行操控、强迫他人心意的语句。若原文有牵涉感情控制、强迫别人行事，必须改写为「化解彼此隔阂、消释芥蒂、愿缘分平和顺遂，彼此心甘情愿」之类中正表述。
4.全文输出繁体中文，行文温和中正，适合写在祈福笺祈愿栏，不要多余解释，只输出润色完成的祈愿正文。`;

  try{
    const r=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model:f_model.value||'deepseek-chat',messages:[{role:'system',content:sys},{role:'user',content:`用户原始愿望：${raw}`}],temperature:0.7,max_tokens:2048})});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${r.status}`)}
    const d=await r.json();
    const txt=d.choices?.[0]?.message?.content||'';
    if(txt){polishedPrayer=txt.trim();save();showToast('AI润色完成！祈愿文已自动填入，请点击「生成预览」查看')}
    else throw new Error('API返回内容为空');
  }catch(e){showToast('AI润色失败: '+e.message);console.error(e)}
  finally{btnAi.disabled=false;btnAi.innerHTML='✨ AI润色祈愿文'}
}

btnTest.addEventListener('click',testApi);

btnGen.addEventListener('click',async()=>{save();await showPreview();showToast('祈福笺预览已生成')});
btnPdf.addEventListener('click',async()=>{if(!previewImg){showPreview();await new Promise(r=>setTimeout(r,200))}await exportPDF()});
$('#btn-zin').addEventListener('click',zoomIn);
$('#btn-zout').addEventListener('click',zoomOut);
$('#btn-zfit').addEventListener('click',zoomFit);
